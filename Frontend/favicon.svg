<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e8f0f8"/>
    </linearGradient>
    
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8247e5"/>
      <stop offset="100%" stop-color="#6c2ad1"/>
    </linearGradient>

    <!-- Radial gradient for glow effect -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>

    <!-- Filter for shadow -->
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main Background -->
  <rect width="256" height="256" rx="50" ry="50" fill="url(#bgGradient)"/>
  
  <!-- Inner Black Circle Background -->
  <circle cx="128" cy="128" r="100" fill="#000000"/>
  
  <!-- Subtle pattern background -->
  <circle cx="128" cy="128" r="110" fill="url(#glowGradient)"/>

  <!-- Decorative top accent -->
  <rect x="60" y="45" width="136" height="2" rx="1" fill="url(#chainGradient)" opacity="0.4"/>

  <!-- Left Chain Link (Green) -->
  <g filter="url(#shadowFilter)">
    <rect x="50" y="90" width="80" height="50" rx="25"
          fill="none"
          stroke="url(#chainGradient)"
          stroke-width="12"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Right Chain Link (Purple) -->
  <g filter="url(#shadowFilter)">
    <rect x="126" y="116" width="80" height="50" rx="25"
          fill="none"
          stroke="url(#purpleGradient)"
          stroke-width="12"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Center Connection Link (subtle) -->
  <line x1="110" y1="128" x2="146" y2="128"
        stroke="url(#chainGradient)"
        stroke-width="10"
        stroke-linecap="round"
        opacity="0.6"/>

  <!-- Center Nexus Point -->
  <circle cx="128" cy="128" r="12" fill="url(#chainGradient)" filter="url(#shadowFilter)"/>
  <circle cx="128" cy="128" r="8" fill="#00ff88" opacity="0.8"/>

  <!-- Decorative circles around center -->
  <circle cx="128" cy="95" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="155" cy="128" r="3" fill="#8247e5" opacity="0.5"/>
  <circle cx="128" cy="161" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="101" cy="128" r="3" fill="#8247e5" opacity="0.5"/>

  <!-- Bottom accent line -->
  <rect x="60" y="209" width="136" height="2" rx="1" fill="url(#purpleGradient)" opacity="0.4"/>

  <!-- Subtle glow ring -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="url(#chainGradient)" 
          stroke-width="1" opacity="0.1" stroke-dasharray="5,5"/>
</svg>